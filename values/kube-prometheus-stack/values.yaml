# kube-prometheus-stack Helm values for Netra.
#
# Helm release: netra-kps
# Namespace:    observability
# Chart:        prometheus-community/kube-prometheus-stack 86.1.0
#
# This stack ships Prometheus, Alertmanager, Grafana, node-exporter,
# kube-state-metrics, and the Prometheus Operator. It is the single
# metrics + dashboards plane for dev, stage, and prod.
#
# Retention: 15d (metrics).
# Storage:   SSD PVC for Prometheus.
#
# Resource requests/limits target a single e2-standard-2 observability
# node (2 vCPU, 8 GiB). Raise limits if you use e2-standard-4 or larger.

fullnameOverride: netra-kps

# Prometheus stamps cluster on stack metrics only. App environment
# (dev/stage/prod) comes from pod labels — Netra has no env of its own.

defaultRules:
  create: true
  rules:
    # Custom PrometheusRules under manifests/prometheus/prometheusrules/ are
    # authoritative for app + platform alerts. Disable chart groups that
    # overlap (KubePodCrashLooping, Node* from node-exporter, etc.).
    etcd: true
    kubernetesApps: false
    kubernetesResources: false
    kubernetesStorage: false
    kubernetesSystem: true
    kubeStateMetrics: true
    nodeExporterAlerting: false
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
    # Off by default to avoid double-alerting once our rules are loaded.
    general: false

# -----------------------------------------------------------------------------
# Prometheus
# -----------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: ""        # PVC size governs; leave size-based retention off.
    scrapeInterval: 30s
    evaluationInterval: 30s

    # Pick up ServiceMonitor / PodMonitor / PrometheusRule resources across
    # every namespace so app teams can declare scrape targets in their own ns.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    ruleSelector: {}
    probeSelectorNilUsesHelmValues: false
    probeNamespaceSelector: {}
    probeSelector: {}

    # Cluster identity — install.sh overrides via values/cluster.yaml /
    # NETRA_CLUSTER. Default shown here for helm template without install.
    externalLabels:
      cluster: netra

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi

    resources:
      requests:
        cpu: 400m
        memory: 1536Mi
      limits:
        cpu: 1
        memory: 2048Mi

    nodeSelector:
      workload: observability
    tolerations:
      - key: workload
        operator: Equal
        value: observability
        effect: NoSchedule

  service:
    type: ClusterIP             # Never expose Prometheus publicly.

  ingress:
    enabled: false

# -----------------------------------------------------------------------------
# Alertmanager
# -----------------------------------------------------------------------------
alertmanager:
  enabled: true
  alertmanagerSpec:
    retention: 120h
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 384Mi
    nodeSelector:
      workload: observability
    tolerations:
      - key: workload
        operator: Equal
        value: observability
        effect: NoSchedule

  config:
    # Default routes to null so we never page into the void before real
    # receivers are wired. See manifests/alertmanager/receivers-secret.example.yaml
    # and docs/production-checklist.md before pointing a pager here.
    route:
      receiver: "null"
      group_by: ["alertname", "environment", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "critical"
          receiver: "null"
        - matchers:
            - severity = "warning"
          receiver: "null"
    receivers:
      - name: "null"
    # Example (after mounting netra-alertmanager-receivers Secret):
    # route:
    #   receiver: slack-platform
    #   routes:
    #     - matchers: [severity = "critical"]
    #       receiver: pagerduty-oncall
    # receivers:
    #   - name: pagerduty-oncall
    #     pagerduty_configs: [{ routing_key: "<KEY>", send_resolved: true }]
    #   - name: slack-platform
    #     slack_configs: [{ api_url: "<WEBHOOK>", channel: "#alerts" }]

  service:
    type: ClusterIP
  ingress:
    enabled: false

# -----------------------------------------------------------------------------
# Grafana
# -----------------------------------------------------------------------------
grafana:
  enabled: true

  # Admin password sourced from a pre-created Secret. Do not put the
  # password in this file.
  admin:
    existingSecret: netra-grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  defaultDashboardsEnabled: true

  # Sidecars: load dashboards + datasources from ConfigMaps so everything
  # is Git-owned.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: observability
      folderAnnotation: grafana_folder
      provider:
        # MUST stay false. With foldersFromFilesStructure: true the file
        # provider re-derives folders on every updateInterval scan (30s) and
        # Grafana does not reconcile them by name — it creates NEW folders each
        # pass. That silently multiplied into 500+ empty duplicate "Platform"/
        # "OPA" folders. False = dashboards load into a single (General) folder,
        # stable across scans.
        foldersFromFilesStructure: false
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: observability
      # Our datasources (manifests/grafana/datasources-configmap.yaml) define
      # the default Prometheus (uid netra-prometheus). Don't let the chart also
      # provision its own default Prometheus — two isDefault:true datasources
      # make Grafana abort provisioning ("Only one datasource per organization
      # can be marked as default") and CrashLoop.
      defaultDatasourceEnabled: false

  # Datasources ship as a ConfigMap (manifests/grafana/datasources-configmap.yaml)
  # picked up by the sidecar above. Leave the chart's built-in datasources block
  # EMPTY ({}), not `{datasources.yaml: {datasources: []}}`: the latter still makes
  # the chart render a datasources.yaml and subPath-mount it into the same dir the
  # sidecar mounts as an emptyDir. That mount collision yields a 0-byte
  # datasources.yaml, which Grafana 13 rejects ("data source not found").
  datasources: {}

  # Netra's own dashboards are provisioned via dedicated providers with PINNED
  # folderUids. Grafana reconciles provisioned folders by UID, so these folders
  # can NEVER duplicate — unlike the sidecar + foldersFromFilesStructure path,
  # which silently created hundreds of duplicate "Platform"/"OPA" folders that
  # then could not be deleted (they held provisioned dashboards). The sidecar
  # above is retained ONLY for the chart's built-in kube-prometheus-stack
  # dashboards, which land in the General folder.
  #
  # Each provider reads /var/lib/grafana/dashboards/<name>, mounted from the
  # matching ConfigMap in dashboardsConfigMaps below. Those ConfigMaps
  # (netra-dash-<slug>) are built by scripts/install.sh:package_dashboard_cms
  # and MUST exist before this pod starts (the chart mounts them as required
  # volumes). Adding a new folder = add a provider here + a mapping below.
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: netra-platform
          orgId: 1
          folder: Platform
          # folderUid MUST be namespaced away from dashboard UIDs. A folder and a
          # dashboard sharing a UID makes Grafana's nested-folder Browse tree treat
          # the folder as a child of itself -> infinite recursion -> the frontend
          # crashes with "Maximum call stack size exceeded" on folder expand.
          folderUid: netra-folder-platform
          type: file
          disableDeletion: false
          allowUiUpdates: false
          updateIntervalSeconds: 30
          options:
            path: /var/lib/grafana/dashboards/netra-platform
            foldersFromFilesStructure: false
        - name: netra-services
          orgId: 1
          folder: Services
          folderUid: netra-folder-services
          type: file
          disableDeletion: false
          allowUiUpdates: false
          updateIntervalSeconds: 30
          options:
            path: /var/lib/grafana/dashboards/netra-services
            foldersFromFilesStructure: false
        - name: netra-opa
          orgId: 1
          folder: OPA
          folderUid: netra-folder-opa
          type: file
          disableDeletion: false
          allowUiUpdates: false
          updateIntervalSeconds: 30
          options:
            path: /var/lib/grafana/dashboards/netra-opa
            foldersFromFilesStructure: false
        - name: netra-rum
          orgId: 1
          folder: RUM
          folderUid: netra-folder-rum
          type: file
          disableDeletion: false
          allowUiUpdates: false
          updateIntervalSeconds: 30
          options:
            path: /var/lib/grafana/dashboards/netra-rum
            foldersFromFilesStructure: false

  # Maps provider name -> ConfigMap; chart mounts each at
  # /var/lib/grafana/dashboards/<provider name>.
  dashboardsConfigMaps:
    netra-platform: netra-dash-platform
    netra-services: netra-dash-services
    netra-opa: netra-dash-opa
    netra-rum: netra-dash-rum

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/"
    auth:
      disable_login_form: false
    auth.anonymous:
      enabled: false
    security:
      cookie_secure: true
    users:
      default_theme: dark

  # Netra symbol replaces the default Grafana login mark (ConfigMap from install.sh).
  extraConfigmapMounts:
    - name: netra-grafana-branding-icon
      mountPath: /usr/share/grafana/public/img/grafana_icon.svg
      subPath: grafana_icon.svg
      configMap: netra-grafana-branding
      readOnly: true
    - name: netra-grafana-branding-logo
      mountPath: /usr/share/grafana/public/img/grafana_typelogo.svg
      subPath: grafana_icon.svg
      configMap: netra-grafana-branding
      readOnly: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 384Mi

  nodeSelector:
    workload: observability
  tolerations:
    - key: workload
      operator: Equal
      value: observability
      effect: NoSchedule

  service:
    type: ClusterIP             # Use port-forward, ingress with auth, or
                                # a private LB — never public by default.
  ingress:
    enabled: false

  persistence:
    enabled: true
    type: pvc
    storageClassName: standard-rwo
    size: 10Gi
    accessModes: ["ReadWriteOnce"]

# -----------------------------------------------------------------------------
# Operators / exporters
# -----------------------------------------------------------------------------
prometheusOperator:
  nodeSelector:
    workload: observability
  tolerations:
    - key: workload
      operator: Equal
      value: observability
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 384Mi

# node-exporter runs on every node so we get node metrics from app pools too.
nodeExporter:
  enabled: true
prometheus-node-exporter:
  tolerations:
    - operator: Exists           # DaemonSet on all nodes.
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

kube-state-metrics:
  nodeSelector:
    workload: observability
  tolerations:
    - key: workload
      operator: Equal
      value: observability
      effect: NoSchedule
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 192Mi
