# OpenTelemetry Collector Helm values for Netra.
#
# Helm release: netra-otel-collector
# Namespace:    observability
# Chart:        open-telemetry/opentelemetry-collector 0.158.0 (collector 0.153.0)
#
# This collector ingests OTLP from Python APIs/workers (later) and from the
# Faro receiver running in Alloy, then forwards traces to Tempo.
#
# Forwards OTLP traces to netra-tempo.

fullnameOverride: netra-otel-collector

mode: deployment
replicaCount: 2

image:
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

nodeSelector:
  workload: observability
tolerations:
  - key: workload
    operator: Equal
    value: observability
    effect: NoSchedule

# Disable defaults; we declare every pipeline explicitly.
presets:
  logsCollection:
    enabled: false
  kubernetesAttributes:
    enabled: false
  kubeletMetrics:
    enabled: false
  hostMetrics:
    enabled: false

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  health:
    enabled: true
    containerPort: 13133
    servicePort: 13133
    protocol: TCP

service:
  type: ClusterIP               # Cluster-internal; apps push from in-cluster.

config:
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      send_batch_size: 1024
      timeout: 5s
      send_batch_max_size: 2048
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    # Stamp cluster on every span. Apps set deployment.environment via OTLP.
    resource/env:
      attributes:
        - key: cluster
          value: netra
          action: upsert

  exporters:
    otlp/tempo:
      endpoint: netra-tempo.observability.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers:  [otlp]
        processors: [memory_limiter, resource/env, batch]
        exporters:  [otlp/tempo]
    telemetry:
      metrics:
        address: 0.0.0.0:8888

serviceMonitor:
  enabled: true
