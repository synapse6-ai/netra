# Tempo Helm values for Netra.
#
# Helm release: netra-tempo
# Namespace:    observability
# Chart:        grafana-community/tempo 2.x (single-binary StatefulSet)
#
# Tempo ingests OTLP from the OpenTelemetry Collector and stores traces
# in Google Cloud Storage (GCS). GCS auth uses GKE Workload Identity
# (serviceAccount.annotations below) — no static keys, no mounted Secret.
#
# Retention: 7d by default. Raise `tempo.retention` to 360h (15d) per
# platform policy; the chart drives the compactor block_retention from it.
#
# Sized for e2-standard-2 observability node (see manifests/node-scheduling.yaml).

fullnameOverride: netra-tempo

tempo:
  retention: 168h               # 7d. Raise to 360h for 15d.
  metricsGenerator:
    enabled: false              # Out of scope for this scaffold.

  resources:
    requests:
      cpu: 150m
      memory: 512Mi
    limits:
      cpu: 500m
      # 768Mi OOMKilled netra-tempo-0 on a ~3-day cycle as ingest/WAL/query
      # memory grew. Raised to give headroom for the single-binary deployment.
      memory: 2Gi

  storage:
    trace:
      backend: gcs
      gcs:
        bucket_name:       netra-tempo-data
        chunk_buffer_size: 10485760   # 10 MiB
        # Auth: GKE Workload Identity via serviceAccount.annotations below.
        # The GCS client uses Application Default Credentials — no keys here.

  # OTLP receivers for the OpenTelemetry Collector only. Apps must send
  # traces to netra-otel-collector, not here directly. NetworkPolicy
  # netra-tempo-ingress enforces this at the pod level.
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  overrides:
    defaults:
      ingestion:
        rate_limit_bytes: 20000000
        burst_size_bytes: 30000000

persistence:
  enabled: true
  storageClassName: standard-rwo
  size: 20Gi                    # WAL only; bulk data is in GCS.

nodeSelector:
  workload: observability
tolerations:
  - key: workload
    operator: Equal
    value: observability
    effect: NoSchedule

service:
  type: ClusterIP

# For GKE Workload Identity, set iam.gke.io/gcp-service-account on this SA.
serviceAccount:
  create: true
  annotations: {}

serviceMonitor:
  enabled: true
