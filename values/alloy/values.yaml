# Grafana Alloy Helm values for Netra.
#
# Helm release: netra-alloy
# Namespace:    observability
# Chart:        grafana/alloy 1.8.2
#
# Alloy config lives in values/alloy/config.alloy and is injected by
# install.sh (cluster name via envsubst). Do not put config inline here.

fullnameOverride: netra-alloy

controller:
  type: daemonset
  nodeSelector: {}
  tolerations:
    - operator: Exists

alloy:
  podLabels:
    netra.io/collector: loki

  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 384Mi

  configMap:
    create: true
    # content: set by install.sh --set-file from values/alloy/config.alloy

service:
  enabled: true
  type: ClusterIP
  extraPorts:
    - name: faro
      port: 12347
      targetPort: 12347
      protocol: TCP

serviceMonitor:
  enabled: true
