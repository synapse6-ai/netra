# Grafana Alloy Helm values for Netra.
#
# Helm release: netra-alloy
# Namespace:    observability
# Chart:        grafana/alloy 1.8.2
#
# Alloy is our single agent: it collects pod logs, scrapes some metrics,
# and exposes a Faro receiver for browser RUM. Alloy then writes logs to
# Loki and forwards traces/metrics. It runs as a DaemonSet so logs are
# collected from every node, including app pools.
#
# Promtail is intentionally not used.

fullnameOverride: netra-alloy

controller:
  type: daemonset               # Logs need a per-node collector.
  nodeSelector: {}              # Run on every node.
  tolerations:
    - operator: Exists          # Tolerate observability + app taints.

alloy:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

  # Alloy config. Pipelines below are intentionally minimal and conservative.
  configMap:
    create: true
    content: |
      // -------------------------------------------------------------------
      // Discovery: every pod on this node, with Kubernetes metadata.
      // -------------------------------------------------------------------
      discovery.kubernetes "pods" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("HOSTNAME")
        }
      }

      // -------------------------------------------------------------------
      // Logs: pod stdout/stderr -> Loki.
      //
      // Allowed (low-cardinality) labels:
      //   environment, namespace, service_name, pod, container, level,
      //   cluster, team
      //
      // Forbidden as labels (kept inside the JSON body / structured metadata):
      //   request_id, trace_id, span_id, user_id, event_id, email,
      //   session_id, tenant_id
      // -------------------------------------------------------------------
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "service_name"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_team"]
          target_label  = "team"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_environment"]
          target_label  = "environment"
        }
        rule {
          target_label = "cluster"
          replacement  = "netra"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.app_logs.receiver]
      }

      loki.process "app_logs" {
        forward_to = [loki.write.default.receiver]

        // Parse JSON bodies so we can lift `level` to a label but keep
        // request_id/trace_id/etc inside the body.
        stage.json {
          expressions = {
            level = "level",
          }
        }
        stage.labels {
          values = { level = "" }
        }
      }

      loki.write "default" {
        endpoint {
          url = "http://netra-loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
        external_labels = {
          cluster = "netra",
        }
      }

      // -------------------------------------------------------------------
      // RUM: Grafana Faro receiver (browser SDK target).
      //
      // Browser RUM: services point a Faro Web SDK here per the contract
      // (docs/app-integration.md). Netra just exposes the receiver.
      // -------------------------------------------------------------------
      faro.receiver "default" {
        server {
          listen_address = "0.0.0.0"
          listen_port    = 12347
          cors_allowed_origins = [
            "http://localhost:3000",
          ]
        }

        sourcemaps { }

        output {
          logs   = [loki.write.default.receiver]
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      // -------------------------------------------------------------------
      // Trace egress used by the Faro receiver. App OTLP traffic targets
      // the OpenTelemetry Collector directly, not Alloy.
      // -------------------------------------------------------------------
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "netra-otel-collector.observability.svc.cluster.local:4317"
          tls { insecure = true }
        }
      }

# Expose the Faro receiver as a Service so the browser SDK can reach it
# via cluster ingress (added separately, not in this scaffold).
service:
  enabled: true
  type: ClusterIP

serviceMonitor:
  enabled: true                 # Scrape Alloy's own /metrics.
