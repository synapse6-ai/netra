# Per-environment redirect URL for oauth2-proxy.
# dev:  https://obs-dev.instantevidence.ai/oauth2/callback
# stg:  https://obs-stg.instantevidence.ai/oauth2/callback
# prod: https://obs.instantevidence.ai/oauth2/callback

apiVersion: v1
kind: Secret
metadata:
  name: grafana-oauth2-env
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
type: Opaque
stringData:
  redirect-url: "https://obs-dev.instantevidence.ai/oauth2/callback"
  cookie-secret: "REPLACE_WITH_32_CHAR_RANDOM_STRING"
