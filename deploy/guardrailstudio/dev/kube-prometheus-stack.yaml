# GuardrailStudio dev — Grafana auth.proxy trusts oauth2-proxy X-Forwarded-Email.
# Public ingress is deploy/guardrailstudio/dev/grafana-ingress.yaml → oauth2-proxy.

grafana:
  grafana.ini:
    server:
      root_url: "https://obs-dev.instantevidence.ai/"
      domain: "obs-dev.instantevidence.ai"
    auth:
      disable_login_form: true
    auth.proxy:
      enabled: true
      header_name: X-Forwarded-Email
      header_property: email
      auto_sign_up: true
      enable_login_token: false
    auth.anonymous:
      enabled: false
    users:
      auto_assign_org_role: Viewer
  ingress:
    enabled: false
