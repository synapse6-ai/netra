# Example ingest auth Secret — apply manually, never commit real tokens.
#
#   kubectl create secret generic netra-ingest-auth \
#     --namespace=observability \
#     --from-literal=token="$(openssl rand -base64 32)"
#
# Used by:
#   - Central OTel collector (bearertokenauth on OTLP receivers)
#   - netra-ingest-gateway nginx (Loki push + Prometheus remote_write ILBs)
#   - App-cluster agents (synapse6-ingest-auth, set via INGEST_TOKEN at install)
apiVersion: v1
kind: Secret
metadata:
  name: netra-ingest-auth
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
type: Opaque
stringData:
  token: "REPLACE_ME_GENERATE_WITH_openssl_rand"
