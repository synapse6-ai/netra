---
# Bearer-token nginx gateway for cross-cluster Loki push + Prometheus remote_write.
# initContainer renders the auth map with safe token escaping (no sed injection).
# ILBs in ingest-internal-services.yaml target this Deployment.

apiVersion: v1
kind: ConfigMap
metadata:
  name: netra-ingest-gateway-nginx
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
data:
  servers.conf: |
    server {
      listen 3100;
      client_max_body_size 32m;

      location / {
        if ($bearer_ok = 0) {
          return 401;
        }
        proxy_pass http://netra-loki.observability.svc.cluster.local:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Scope-OrgID "1";
      }
    }

    server {
      listen 9090;
      client_max_body_size 64m;

      location /api/v1/write {
        if ($bearer_ok = 0) {
          return 401;
        }
        proxy_pass http://netra-kps-kube-prometheus-prometheus.observability.svc.cluster.local:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
    }
  render.sh: |
    #!/bin/sh
    set -eu
    token=$(tr -d '\n' < /secrets/token)
    escaped=$(printf '%s' "$token" | sed 's/\\/\\\\/g; s/"/\\"/g')
    cat > /etc/nginx/conf.d/00-auth-map.conf <<EOF
    map \$http_authorization \$bearer_ok {
      default 0;
      "Bearer ${escaped}" 1;
    }
    EOF
    cp /templates/servers.conf /etc/nginx/conf.d/01-servers.conf
---
apiVersion: v1
kind: Service
metadata:
  name: netra-ingest-gateway
  namespace: observability
  labels:
    app.kubernetes.io/name: netra-ingest-gateway
    app.kubernetes.io/part-of: netra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: netra-ingest-gateway
  ports:
    - name: loki
      port: 3100
      targetPort: 3100
      protocol: TCP
    - name: prom-rw
      port: 9090
      targetPort: 9090
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netra-ingest-gateway
  namespace: observability
  labels:
    app.kubernetes.io/name: netra-ingest-gateway
    app.kubernetes.io/part-of: netra
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: netra-ingest-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netra-ingest-gateway
        app.kubernetes.io/part-of: netra
    spec:
      initContainers:
        - name: render-nginx-config
          image: busybox:1.36
          command: ["/bin/sh", "/templates/render.sh"]
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: nginx-templates
              mountPath: /templates
            - name: ingest-token
              mountPath: /secrets
              readOnly: true
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: loki
              containerPort: 3100
              protocol: TCP
            - name: prom-rw
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-conf
          emptyDir: {}
        - name: nginx-templates
          configMap:
            name: netra-ingest-gateway-nginx
            defaultMode: 0755
        - name: ingest-token
          secret:
            secretName: netra-ingest-auth
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: netra-ingest-gateway
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netra-ingest-gateway
