# Synapse6 central — Tempo overlay.

tempo:
  retention: 168h
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1536Mi
  storage:
    trace:
      backend: gcs
      gcs:
        bucket_name: synapse6-obs-netra-tempo

persistence:
  enabled: true
  storageClassName: premium-rwo
  size: 50Gi

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: netra-tempo@synapse6-observability.iam.gserviceaccount.com
