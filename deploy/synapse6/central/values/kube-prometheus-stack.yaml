# Synapse6 central — kube-prometheus-stack overlay.
# Commercial sizing; accepts remote write from app-cluster Alloy agents.
#
# Stack cluster label (netra-platform) is applied via install.sh when
# NETRA_SKIP_CLUSTER_LABEL=1 — do not set externalLabels here.

prometheus:
  prometheusSpec:
    enableFeatures:
      - remote-write-receiver

    scrapeInterval: 30s
    evaluationInterval: 30s

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2
        memory: 4Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: premium-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 500Gi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

grafana:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  persistence:
    storageClassName: premium-rwo
    size: 20Gi

prometheusOperator:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi

kube-state-metrics:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
