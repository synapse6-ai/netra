---
# Probe CRDs for blackbox_exporter.
#
# Stack probes use layer=platform (no environment — Netra is env-neutral).
# App probes use layer=app + environment=dev|stage|prod on each target.
#
# Prober: netra-blackbox.observability.svc.cluster.local:9115

apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: netra-blackbox-grafana
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  jobName: blackbox-grafana
  interval: 30s
  scrapeTimeout: 10s
  module: http_2xx
  prober:
    url: netra-blackbox.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://netra-kps-grafana.observability.svc.cluster.local/api/health
      labels:
        layer: platform
        service: grafana
        team: platform
        probe_kind: health
