---
# Python API alerts.
#
# Metric names assume prometheus_client wiring with these series:
#   http_requests_total{service, environment, status_code, method, route}
#   http_request_duration_seconds_bucket{service, environment, le, ...}
#   scrape_class="api"  (from Service metadata via ServiceMonitor relabel)
#   up{job=~".*python-api.*"}
#
# App-side instrumentation lives in each consuming service (see
# docs/app-integration.md). These rules become live once a service exports
# the named series.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: netra-python-api-alerts
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  groups:
    - name: netra.python-api
      interval: 30s
      rules:
        - alert: PythonApiHigh5xxRate
          expr: |
            (
              sum by (service, environment, namespace) (
                rate(http_requests_total{service=~".+", status_code=~"5..", scrape_class="api"}[5m])
              )
              /
              sum by (service, environment, namespace) (
                rate(http_requests_total{service=~".+", scrape_class="api"}[5m])
              )
            ) > 0.02
            and on (service, environment, namespace)
            sum by (service, environment, namespace) (
              rate(http_requests_total{service=~".+", scrape_class="api"}[5m])
            ) > 0.1
          for: 10m
          labels:
            severity: critical
            service: python-api
            team: backend
          annotations:
            summary: "Python API 5xx > 2% on {{ $labels.service }} ({{ $labels.environment }})"
            description: "5xx ratio is above 2% for {{ $labels.service }} in {{ $labels.environment }} for 10m."
            dashboard_url: "/d/netra-python-api"
            runbook_url:   "runbooks/python-api-high-5xx.md"

        - alert: PythonApiHighP95Latency
          expr: |
            histogram_quantile(
              0.95,
              sum by (service, environment, namespace, le) (
                rate(http_request_duration_seconds_bucket{scrape_class="api"}[5m])
              )
            ) > 1.0
          for: 10m
          labels:
            severity: warning
            service: python-api
            team: backend
          annotations:
            summary: "Python API p95 latency > 1s on {{ $labels.service }} ({{ $labels.environment }})"
            description: "p95 request latency for {{ $labels.service }} in {{ $labels.environment }} is above 1s for 10m."
            dashboard_url: "/d/netra-python-api"
            runbook_url:   "runbooks/python-api-high-latency.md"

        - alert: PythonApiTargetDown
          expr: |
            up{job=~".*python-api.*"} == 0
          for: 5m
          labels:
            severity: critical
            service: python-api
            team: backend
          annotations:
            summary: "Python API target down: {{ $labels.instance }} ({{ $labels.environment }})"
            description: "Target {{ $labels.instance }} for {{ $labels.job }} has been down for more than 5 minutes."
            dashboard_url: "/d/netra-python-api"
            runbook_url:   "runbooks/python-api-high-5xx.md"
