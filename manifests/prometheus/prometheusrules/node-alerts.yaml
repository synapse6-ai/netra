---
# Node and platform-level alerts.
#
# Prometheus external_labels stamp cluster on stack metrics. App workloads
# carry environment via pod labels on their own series.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: netra-node-alerts
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  groups:
    - name: netra.node
      interval: 30s
      rules:
        - alert: NodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
            service: kubernetes-node
            team: platform
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: "Node {{ $labels.node }} has been NotReady for more than 5 minutes."
            dashboard_url: "/d/netra-kubernetes"
            runbook_url:   "runbooks/node-not-ready.md"

        - alert: NodeDiskPressure
          expr: |
            kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
            service: kubernetes-node
            team: platform
          annotations:
            summary: "DiskPressure on node {{ $labels.node }}"
            description: "Node {{ $labels.node }} reports DiskPressure for more than 5 minutes."
            dashboard_url: "/d/netra-kubernetes"
            runbook_url:   "runbooks/node-disk-pressure.md"

        - alert: NodeMemoryPressure
          expr: |
            kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
            service: kubernetes-node
            team: platform
          annotations:
            summary: "MemoryPressure on node {{ $labels.node }}"
            description: "Node {{ $labels.node }} reports MemoryPressure for more than 5 minutes."
            dashboard_url: "/d/netra-kubernetes"
            runbook_url:   "runbooks/node-not-ready.md"

        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total[15m]) > 5
          for: 10m
          labels:
            severity: warning
            service: kubernetes-pod
            team: platform
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crashlooping"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 5 times in the last 15m."
            dashboard_url: "/d/netra-kubernetes"
            runbook_url:   "runbooks/pod-crashlooping.md"

        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            and on (namespace, pod, container)
            increase(kube_pod_container_status_restarts_total[15m]) > 0
          for: 1m
          labels:
            severity: warning
            service: kubernetes-pod
            team: platform
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled in the last 15m."
            dashboard_url: "/d/netra-kubernetes"
            runbook_url:   "runbooks/pod-crashlooping.md"

        - alert: ObservabilityTargetDown
          expr: |
            up{namespace="observability"} == 0
          for: 5m
          labels:
            severity: warning
            service: '{{ $labels.job }}'
            team: platform
          annotations:
            summary: "Observability target down: {{ $labels.job }}"
            description: "Target {{ $labels.instance }} for job {{ $labels.job }} in the observability namespace has been down for more than 5 minutes."
            dashboard_url: "/d/netra-prometheus-health"
            runbook_url:   "runbooks/pod-crashlooping.md"
