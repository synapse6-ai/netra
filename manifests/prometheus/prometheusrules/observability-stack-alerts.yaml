---
# Alerts for the Netra observability stack itself.
#
# If Netra is the only signal source you'll notice these break first.
# Keep them loud.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: netra-observability-stack-alerts
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  groups:
    - name: netra.observability-stack
      interval: 30s
      rules:
        - alert: LokiIngestionErrors
          expr: |
            sum by (namespace, pod) (
              rate(loki_request_duration_seconds_count{status_code=~"5..", route=~".*push.*"}[5m])
            ) > 0
          for: 10m
          labels:
            severity: critical
            service: loki
            team: platform
          annotations:
            summary: "Loki ingestion errors"
            description: "Loki push handler is returning 5xx errors for 10m."
            dashboard_url: "/d/netra-loki-health"
            runbook_url:   "runbooks/loki-ingestion-errors.md"

        - alert: TempoIngestionErrors
          expr: |
            sum by (namespace, pod) (
              rate(tempo_request_duration_seconds_count{status_code=~"5..", route=~".*push.*|.*ingest.*"}[5m])
            ) > 0
          for: 10m
          labels:
            severity: critical
            service: tempo
            team: platform
          annotations:
            summary: "Tempo ingestion errors"
            description: "Tempo ingest path is returning 5xx errors for 10m."
            dashboard_url: "/d/netra-tempo-health"
            runbook_url:   "runbooks/tempo-ingestion-errors.md"

        - alert: AlloyDown
          expr: |
            up{job=~".*alloy.*"} == 0
          for: 5m
          labels:
            severity: critical
            service: alloy
            team: platform
          annotations:
            summary: "Alloy target down: {{ $labels.instance }}"
            description: "Alloy collector {{ $labels.instance }} has been down for more than 5 minutes — logs and RUM are not being shipped."
            dashboard_url: "/d/netra-alloy-health"
            runbook_url:   "runbooks/alloy-down.md"

        - alert: PrometheusStorageHigh
          expr: |
            (
              kubelet_volume_stats_used_bytes{namespace="observability", persistentvolumeclaim=~".*prometheus.*"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="observability", persistentvolumeclaim=~".*prometheus.*"}
            ) > 0.8
          for: 30m
          labels:
            severity: warning
            service: prometheus
            team: platform
          annotations:
            summary: "Prometheus storage > 80%"
            description: "Prometheus PVC in observability namespace is using more than 80% capacity for more than 30m."
            dashboard_url: "/d/netra-prometheus-health"
            runbook_url:   "runbooks/prometheus-storage-high.md"
