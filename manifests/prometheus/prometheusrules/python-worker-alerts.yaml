---
# Python worker alerts.
#
# Expected series (exported by conforming services — see
# docs/app-integration.md):
#   worker_queue_oldest_job_age_seconds{service, environment, queue}
#   worker_jobs_total{service, environment, status="failed|succeeded"}
#   worker_jobs_retried_total{service, environment}
#   worker_jobs_processed_total{service, environment}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: netra-python-worker-alerts
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  groups:
    - name: netra.python-worker
      interval: 30s
      rules:
        - alert: WorkerQueueAgeHigh
          expr: |
            max by (service, environment, queue, namespace) (
              worker_queue_oldest_job_age_seconds
            ) > 300
          for: 10m
          labels:
            severity: warning
            service: '{{ $labels.service }}'
            team: backend
          annotations:
            summary: "Oldest queued job age > 5m on {{ $labels.service }}/{{ $labels.queue }} ({{ $labels.environment }})"
            description: "Oldest pending job in queue {{ $labels.queue }} for {{ $labels.service }} has been waiting more than 5 minutes."
            dashboard_url: "/d/netra-python-workers"
            runbook_url:   "runbooks/worker-queue-age-high.md"

        - alert: WorkerFailureRateHigh
          expr: |
            (
              sum by (service, environment, namespace) (
                rate(worker_jobs_total{status="failed"}[15m])
              )
              /
              sum by (service, environment, namespace) (
                rate(worker_jobs_total[15m])
              )
            ) > 0.05
            and on (service, environment, namespace)
            sum by (service, environment, namespace) (
              rate(worker_jobs_total[15m])
            ) > 0
          for: 15m
          labels:
            severity: critical
            service: '{{ $labels.service }}'
            team: backend
          annotations:
            summary: "Worker failure rate > 5% on {{ $labels.service }} ({{ $labels.environment }})"
            description: "More than 5% of jobs failed in {{ $labels.service }} in {{ $labels.environment }} over the last 15m."
            dashboard_url: "/d/netra-python-workers"
            runbook_url:   "runbooks/worker-failures-high.md"

        - alert: WorkerRetrySpike
          expr: |
            sum by (service, environment, namespace) (
              rate(worker_jobs_retried_total[10m])
            ) > 1
          for: 10m
          labels:
            severity: warning
            service: '{{ $labels.service }}'
            team: backend
          annotations:
            summary: "Worker retry spike on {{ $labels.service }} ({{ $labels.environment }})"
            description: "Worker is retrying more than 1 job/sec on {{ $labels.service }} in {{ $labels.environment }} for 10m."
            dashboard_url: "/d/netra-python-workers"
            runbook_url:   "runbooks/worker-failures-high.md"

        - alert: WorkerThroughputDrop
          expr: |
            (
              sum by (service, environment, namespace) (rate(worker_jobs_processed_total[10m]))
              <
              0.5 * avg_over_time(
                sum by (service, environment, namespace) (rate(worker_jobs_processed_total[10m]))[1h:10m]
              )
            )
          for: 15m
          labels:
            severity: warning
            service: '{{ $labels.service }}'
            team: backend
          annotations:
            summary: "Worker throughput dropped >50% on {{ $labels.service }} ({{ $labels.environment }})"
            description: "Job throughput for {{ $labels.service }} in {{ $labels.environment }} is less than half its 1h average for 15m."
            dashboard_url: "/d/netra-python-workers"
            runbook_url:   "runbooks/worker-queue-age-high.md"
