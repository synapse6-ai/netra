---
# OPA alerts.
#
# Series come from OPA's built-in Prometheus exposition (/metrics):
#   up{job=~".*opa.*"}
#   http_request_duration_seconds_{bucket,count,sum}{handler,code,...}
#   bundle_failed_load_counter{name=...}
#
# OPA does NOT export opa_decisions_total by default. Use HTTP status
# codes and bundle metrics instead. See docs/app-integration.md.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: netra-opa-alerts
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  groups:
    - name: netra.opa
      interval: 30s
      rules:
        - alert: OpaTargetDown
          expr: |
            up{job=~".*opa.*"} == 0
          for: 5m
          labels:
            severity: critical
            service: opa
            team: platform
          annotations:
            summary: "OPA target down: {{ $labels.instance }} ({{ $labels.environment }})"
            description: "OPA target {{ $labels.instance }} has been down for more than 5 minutes."
            dashboard_url: "/d/netra-opa"
            runbook_url:   "runbooks/opa-decision-errors.md"

        - alert: OpaDecisionLatencyHigh
          expr: |
            histogram_quantile(
              0.95,
              sum by (environment, namespace, le, handler) (
                rate(http_request_duration_seconds_bucket{job=~".*opa.*", handler=~"v1/data.*"}[5m])
              )
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            service: opa
            team: platform
          annotations:
            summary: "OPA p95 decision latency > 50ms ({{ $labels.environment }})"
            description: "OPA p95 decision latency on handler {{ $labels.handler }} is above 50ms in {{ $labels.environment }} for 10m."
            dashboard_url: "/d/netra-opa"
            runbook_url:   "runbooks/opa-latency-high.md"

        - alert: OpaHttp5xxRateHigh
          expr: |
            (
              sum by (environment, namespace) (
                rate(http_request_duration_seconds_count{job=~".*opa.*", code=~"5.."}[5m])
              )
              /
              sum by (environment, namespace) (
                rate(http_request_duration_seconds_count{job=~".*opa.*"}[5m])
              )
            ) > 0.01
            and on (environment, namespace)
            sum by (environment, namespace) (
              rate(http_request_duration_seconds_count{job=~".*opa.*"}[5m])
            ) > 0.1
          for: 10m
          labels:
            severity: critical
            service: opa
            team: platform
          annotations:
            summary: "OPA HTTP 5xx rate > 1% ({{ $labels.environment }})"
            description: "OPA HTTP 5xx rate is above 1% in {{ $labels.environment }} for 10m."
            dashboard_url: "/d/netra-opa"
            runbook_url:   "runbooks/opa-decision-errors.md"

        - alert: OpaBundleLoadFailure
          expr: |
            increase(bundle_failed_load_counter{job=~".*opa.*"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            service: opa
            team: platform
          annotations:
            summary: "OPA bundle load failed on {{ $labels.name }} ({{ $labels.environment }})"
            description: "OPA failed to load bundle {{ $labels.name }} in {{ $labels.environment }} within the last 15m."
            dashboard_url: "/d/netra-opa"
            runbook_url:   "runbooks/opa-decision-errors.md"
