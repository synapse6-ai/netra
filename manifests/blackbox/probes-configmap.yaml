---
# Human-readable mirror of blackbox Probes (informational).
# Source of truth: manifests/prometheus/servicemonitors/blackbox-probes.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: netra-blackbox-probes-catalog
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
data:
  probes.yaml: |
    # Stack probes (layer=platform, no environment)
    grafana:
      target: http://netra-kps-grafana.observability.svc.cluster.local/api/health
    prometheus:
      target: http://netra-kps-prometheus.observability.svc.cluster.local:9090/-/healthy
    loki:
      target: http://netra-loki.observability.svc.cluster.local:3100/ready
    alertmanager:
      target: http://netra-kps-alertmanager.observability.svc.cluster.local:9093/-/healthy

    # App probes: layer=app, environment=dev|stage|prod per target
    # Example (guardrailstudio) — add as Probe CRDs in blackbox-probes.yaml
