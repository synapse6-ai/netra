---
# Netra node-scheduling reference.
#
# Convention:
#   * Dedicated node/pool labelled  workload=observability
#   * Tainted with                  workload=observability:NoSchedule
#
# Components scheduled on that pool (via nodeSelector + tolerations in
# each Helm values file):
#   - Grafana
#   - Prometheus / Alertmanager / Prometheus Operator / kube-state-metrics
#   - Loki
#   - Tempo
#   - OpenTelemetry Collector
#   - blackbox_exporter
#
# Components that must run on every node:
#   - Alloy        (DaemonSet, tolerations: Exists)
#   - node-exporter (DaemonSet, tolerations: Exists)
#
# Operator commands (legacy single-node only — prefer ensure-observability-node-pool.sh):
#   kubectl label  node <NODE> workload=observability --overwrite
#   kubectl taint  node <NODE> workload=observability:NoSchedule --overwrite
#
# GuardrailStudio: ./deploy/guardrailstudio/scripts/ensure-observability-node-pool.sh dev
#
# Dedicated observability nodes provide isolation, not HA. Real HA needs
# >= 3 observability nodes plus replicated/stateless components — out of
# scope for this scaffold.
#
# Recommended GKE machine type: e2-standard-4 (4 vCPU, 16 GiB RAM).
# Helm memory *limits* sum to ~6.3 GiB; e2-standard-4 leaves headroom.
#
# This ConfigMap is informational. Helm values files own the actual
# nodeSelector / tolerations used by the workloads.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netra-node-scheduling-reference
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
data:
  nodeSelector.yaml: |
    nodeSelector:
      workload: observability
  tolerations.yaml: |
    tolerations:
      - key: workload
        operator: Equal
        value: observability
        effect: NoSchedule
  README.md: |
    See manifests/node-scheduling.yaml header for the full convention.
    Edit Helm values files, not this ConfigMap, to change scheduling.

    Default node pool: e2-standard-4 with label workload=observability and
    taint workload=observability:NoSchedule (see ensure-observability-node-pool.sh).
