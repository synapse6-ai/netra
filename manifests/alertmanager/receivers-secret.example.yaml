# Example Alertmanager receiver Secret — NOT applied by install.sh.
#
# Copy, fill in real tokens, apply, then point kube-prometheus-stack at it:
#
#   kubectl create secret generic netra-alertmanager-receivers \
#     --namespace observability \
#     --from-file=alertmanager.yaml=./my-receivers.yaml
#
#   # In values/kube-prometheus-stack/values.yaml set:
#   # alertmanager:
#   #   alertmanagerSpec:
#   #     configSecret: netra-alertmanager-receivers
#
# Never commit real PagerDuty/Slack/Opsgenie tokens to Git.
apiVersion: v1
kind: Secret
metadata:
  name: netra-alertmanager-receivers
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
type: Opaque
stringData:
  alertmanager.yaml: |
    route:
      receiver: slack-platform
      group_by: ["alertname", "environment", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "critical"
          receiver: pagerduty-oncall
        - matchers:
            - severity = "warning"
          receiver: slack-platform
    receivers:
      - name: pagerduty-oncall
        pagerduty_configs:
          - routing_key: "<PAGERDUTY_ROUTING_KEY>"
            send_resolved: true
      - name: slack-platform
        slack_configs:
          - api_url: "<SLACK_WEBHOOK_URL>"
            channel: "#platform-alerts"
            send_resolved: true
