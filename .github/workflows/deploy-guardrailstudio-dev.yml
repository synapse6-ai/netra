name: Deploy GuardrailStudio Dev (Netra)

# Installs Netra observability stack on guardrailstudio-dev, then Grafana edge.
#
# Job phases (explicit steps — not one opaque shell wrapper):
#   1. Auth + GKE credentials
#   2. Core stack (Helm + verify --deep)
#   3. Grafana edge (GSM → secrets → oauth2-proxy → ingress)
#   4. Edge verify (--edge)
#
# Auth pattern (matches GuardrailStudio dev-release):
#   1. REGISTRY_PASSWORD — bootstrap SA (secret-manager@…) from GitHub secret
#   2. github-netra-deploy-json — deploy SA from Secret Manager (container.admin)
#
# GSM secrets (synapse6ai-dev):
#   synapse-secret-manager-json  — bootstrap (also in GitHub REGISTRY_PASSWORD)
#   github-netra-deploy-json     — Netra Helm/GKE deploy SA
#   netra-grafana-edge-dev       — Grafana OAuth JSON (see deploy/guardrailstudio/examples/)

on:
  workflow_dispatch:
    inputs:
      skip_bootstrap:
        description: Skip GCS bootstrap (already done)
        type: boolean
        default: true
      skip_observability_pool:
        description: Skip observability node pool create only (unlabel/wait still run)
        type: boolean
        default: false
      skip_grafana_edge:
        description: Skip oauth2-proxy + ingress (core stack only)
        type: boolean
        default: false
      helm_timeout:
        description: Helm --timeout per release (e.g. 45m)
        type: string
        default: 45m

permissions:
  contents: read

env:
  GCP_PROJECT: synapse6ai-dev
  GKE_CLUSTER: guardrailstudio-dev
  GKE_ZONE: us-central1-a
  DEPLOY_SA_SECRET: github-netra-deploy-json
  GRAFANA_EDGE_GSM: netra-grafana-edge-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Fail fast when REGISTRY_PASSWORD is missing
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "${REGISTRY_PASSWORD:-}" ]; then
            echo "::error::Missing REGISTRY_PASSWORD (bootstrap SA JSON — same as GuardrailStudio dev CI)."
            exit 1
          fi

      - uses: google-github-actions/setup-gcloud@v3
        with:
          version: '556.0.0'
          project_id: synapse6ai-dev
          install_components: gke-gcloud-auth-plugin

      - name: Bootstrap GCP auth (Secret Manager reader)
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" > sa-bootstrap.raw
          if [ "$(head -c1 sa-bootstrap.raw)" = "{" ]; then
            mv sa-bootstrap.raw sa-bootstrap.json
          else
            base64 -d sa-bootstrap.raw > sa-bootstrap.json
          fi
          gcloud auth activate-service-account --key-file=sa-bootstrap.json

      - name: Fetch Netra deploy SA from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --secret="${DEPLOY_SA_SECRET}" \
            --project="${GCP_PROJECT}" > sa-deploy.json
          gcloud auth activate-service-account --key-file=sa-deploy.json
          rm -f sa-bootstrap.json sa-bootstrap.raw sa-deploy.json

      - name: Configure kubectl for GKE
        run: |
          gcloud container clusters get-credentials "${GKE_CLUSTER}" \
            --zone="${GKE_ZONE}" \
            --project="${GCP_PROJECT}"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Install jq and envsubst
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq gettext-base dnsutils

      - name: Bootstrap GCP (GCS + Workload Identity)
        if: inputs.skip_bootstrap != true
        run: PROJECT=synapse6ai-dev ./deploy/guardrailstudio/scripts/bootstrap-gcp.sh

      - name: "Phase 1 — Install Netra core stack"
        env:
          HELM_TIMEOUT: ${{ inputs.helm_timeout }}
          SKIP_OBSERVABILITY_POOL_CREATE: ${{ inputs.skip_observability_pool && 'true' || 'false' }}
          SKIP_GRAFANA_EDGE: "true"
        run: ./deploy/guardrailstudio/scripts/install-env.sh dev

      - name: "Phase 2 — Apply Grafana edge (oauth2-proxy + ingress)"
        if: inputs.skip_grafana_edge != true
        env:
          NETRA_GRAFANA_EDGE_GSM: ${{ env.GRAFANA_EDGE_GSM }}
        run: ./deploy/guardrailstudio/scripts/apply-grafana-edge.sh dev

      - name: "Phase 3 — Verify Grafana edge"
        if: inputs.skip_grafana_edge != true
        run: ./scripts/verify.sh --edge
