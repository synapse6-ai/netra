name: Deploy GuardrailStudio Dev (Netra)

# Installs the Netra observability stack on guardrailstudio-dev.
# Run from GitHub Actions (stable GKE API path) — not from a laptop terminal.
#
# Required secrets:
#   GCP_SA_KEY — JSON key for a SA with container.admin + storage.admin on synapse6ai-dev

on:
  workflow_dispatch:
    inputs:
      skip_bootstrap:
        description: Skip GCS bootstrap (already done)
        type: boolean
        default: true
      helm_timeout:
        description: Helm --timeout per release (e.g. 45m)
        type: string
        default: 45m

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Fail fast when GCP_SA_KEY is missing
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "${GCP_SA_KEY:-}" ]; then
            echo "::error::Missing secret GCP_SA_KEY (JSON service account for synapse6ai-dev)."
            exit 1
          fi

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: guardrailstudio-dev
          location: us-central1-a
          project_id: synapse6ai-dev

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Install jq and envsubst
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq gettext-base

      - name: Bootstrap GCP (GCS + Workload Identity)
        if: inputs.skip_bootstrap != true
        run: PROJECT=synapse6ai-dev ./deploy/guardrailstudio/scripts/bootstrap-gcp.sh

      - name: Label observability node
        run: ./deploy/guardrailstudio/scripts/label-observability-node.sh

      - name: Install Netra core stack
        env:
          HELM_TIMEOUT: ${{ inputs.helm_timeout }}
        run: ./deploy/guardrailstudio/scripts/install-env.sh dev
